<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
    "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

<f:metadata>
    <f:viewAction action="#{authBean.checkCitizenAccess}" />
    <f:viewAction action="#{profileBean.loadProfile}" />
</f:metadata>

<h:head>
    <title>My Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&amp;family=Playfair+Display:wght@600;700&amp;display=swap"
          rel="stylesheet"/>

    <style>
        :root {
            --gold:            #C9A84C;
            --gold-hover:      #B8962E;
            --gold-dim:        #9A7A28;
            --gold-bg:         rgba(201,168,76,.07);
            --gold-bg2:        rgba(201,168,76,.13);
            --gold-border:     rgba(201,168,76,.28);

            --sidebar-bg:      #161618;
            --surface:         #FFFFFF;
            --surface-2:       #F8F8FA;
            --bg:              #F2F3F6;
            --text-primary:    #16161A;
            --text-secondary:  #52525B;
            --text-muted:      #8A8A96;
            --border:          #E4E4E8;
            --border-subtle:   #EFEFEF;

            --success-bg:      #EEF6F1;
            --success-text:    #1F6E3A;
            --success-border:  rgba(31,110,58,.18);

            --danger-bg:       #FDF1F1;
            --danger-text:     #9B2424;
            --danger-border:   rgba(155,36,36,.18);

            --radius-sm:  8px;
            --radius-md:  12px;
            --radius-lg:  16px;
            --radius-xl:  20px;

            --shadow-xs:  0 1px 3px rgba(0,0,0,.06);
            --shadow-sm:  0 2px 8px rgba(0,0,0,.07);
            --shadow-lg:  0 8px 40px rgba(0,0,0,.13);

            --transition: all .18s ease;
        }

        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ── LAYOUT ── */
        .main {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ── TOPBAR ── */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 40;
            box-shadow: var(--shadow-xs);
            flex-shrink: 0;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 18px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--gold-border);
            background: var(--gold-bg);
            color: var(--gold-dim);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: var(--transition);
            letter-spacing: .01em;
            font-family: 'DM Sans', sans-serif;
        }

        .back-btn i {
            font-size: 12px;
            color: var(--gold);
            transition: var(--transition);
        }

        .back-btn:hover {
            background: var(--gold-bg2);
            border-color: rgba(201,168,76,.44);
            color: var(--gold-hover);
            box-shadow: 0 2px 10px rgba(201,168,76,.18);
            transform: translateX(-2px);
        }

        .back-btn:hover i { color: var(--gold-hover); }

        .topbar-sep {
            color: var(--text-muted);
            font-size: 14px;
            opacity: .5;
        }

        .topbar-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 22px;
            color: var(--text-primary);
            font-weight: 600;
            letter-spacing: -.01em;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon-btn {
            width: 42px; height: 42px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 15px;
            transition: var(--transition);
            position: relative;
            text-decoration: none;
        }

        .icon-btn:hover {
            background: var(--surface-2);
            color: var(--text-primary);
            border-color: #D0D0D6;
        }

        .notif-dot {
            position: absolute;
            top: 9px; right: 9px;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--gold);
            border: 1.5px solid var(--surface);
        }

        .logout-btn-wrap .ui-button {
            display: inline-flex !important;
            align-items: center !important;
            gap: 9px !important;
            padding: 10px 20px !important;
            border-radius: 10px !important;
            border: 1px solid var(--border) !important;
            background: var(--surface) !important;
            color: var(--text-secondary) !important;
            font-size: 14px !important;
            font-weight: 500 !important;
            font-family: 'DM Sans', sans-serif !important;
            transition: var(--transition) !important;
            box-shadow: none !important;
        }

        .logout-btn-wrap .ui-button:hover {
            background: var(--danger-bg) !important;
            border-color: var(--danger-border) !important;
            color: var(--danger-text) !important;
        }

        /* ── CONTENT ── */
        .content {
            padding: 28px 32px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            flex: 1;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
        }

        /* ── BANNER ── */
        .page-banner {
            background: var(--sidebar-bg);
            border-radius: var(--radius-lg);
            padding: 28px 32px;
            display: flex;
            align-items: center;
            gap: 22px;
            position: relative;
            overflow: hidden;
        }

        .page-banner::before {
            content: '';
            position: absolute;
            right: -40px; top: -40px;
            width: 220px; height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201,168,76,.10) 0%, transparent 70%);
            pointer-events: none;
        }

        .page-banner::after {
            content: '';
            position: absolute;
            right: 100px; bottom: -60px;
            width: 140px; height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201,168,76,.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .avatar-large {
            width: 82px; height: 82px;
            border-radius: 50%;
            background: var(--gold-bg2);
            border: 2.5px solid var(--gold-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 700;
            color: var(--gold);
            flex-shrink: 0;
            z-index: 1;
            text-transform: uppercase;
        }

        .banner-info { z-index: 1; flex: 1; }

        .banner-eyebrow {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .banner-eyebrow::before {
            content: '';
            display: block;
            width: 16px; height: 1.5px;
            background: var(--gold);
            opacity: .6;
        }

        .banner-eyebrow span {
            font-size: 10px;
            font-weight: 600;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: .12em;
        }

        .banner-info .user-name {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: #fff;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .banner-info .user-meta {
            font-size: 13px;
            color: rgba(255,255,255,.40);
        }

        .banner-info .user-meta span {
            color: rgba(255,255,255,.65);
            font-weight: 500;
        }

        .banner-badge {
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--gold-bg2);
            border: 1px solid var(--gold-border);
            color: var(--gold);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .banner-badge i { font-size: 10px; }

        /* ── SECTION CARD ── */
        .section-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .section-head {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 9px;
            letter-spacing: -.01em;
        }

        .section-title i {
            color: var(--gold);
            font-size: 14px;
        }

        /* ── PROFILE GRID ── */
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0;
        }

        .profile-field {
            padding: 18px 22px;
            border-bottom: 1px solid var(--border-subtle);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: var(--transition);
        }

        .profile-field:hover { background: #FAFAFA; }

        .profile-field:nth-child(2n)        { border-right: none; }
        .profile-field:nth-last-child(-n+2) { border-bottom: none; }

        .field-label {
            font-size: 10.5px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .09em;
        }

        .field-value {
            font-size: 13.5px;
            color: var(--text-primary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: 1.4;
        }

        .field-value i {
            color: var(--gold-dim);
            font-size: 12px;
            width: 14px;
            flex-shrink: 0;
        }

        /* ── ACTION ROW ── */
        .action-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding: 16px 24px;
            border-top: 1px solid var(--border-subtle);
            background: var(--surface-2);
            flex-wrap: wrap;
            align-items: center;
        }

        .action-row-left { display: flex; gap: 10px; flex-wrap: wrap; }
        .action-row-right { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn-gold-wrap .ui-button.ui-widget {
            background: var(--gold) !important;
            border: 1px solid var(--gold) !important;
            color: #1A1400 !important;
            border-radius: var(--radius-sm) !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 13px !important;
            font-weight: 700 !important;
            padding: 9px 20px !important;
            transition: var(--transition) !important;
            box-shadow: 0 2px 10px rgba(201,168,76,.28) !important;
            letter-spacing: .01em !important;
        }

        .btn-gold-wrap .ui-button.ui-widget:hover {
            background: var(--gold-hover) !important;
            border-color: var(--gold-hover) !important;
            box-shadow: 0 4px 16px rgba(201,168,76,.36) !important;
        }

        .btn-gold-wrap .ui-button .ui-button-icon-left { color: inherit !important; }

        .btn-secondary-wrap .ui-button.ui-widget {
            background: var(--surface) !important;
            border: 1px solid var(--border) !important;
            color: var(--text-secondary) !important;
            border-radius: var(--radius-sm) !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 13px !important;
            font-weight: 600 !important;
            padding: 9px 20px !important;
            transition: var(--transition) !important;
            box-shadow: none !important;
        }

        .btn-secondary-wrap .ui-button.ui-widget:hover {
            background: var(--gold-bg) !important;
            border-color: var(--gold-border) !important;
            color: var(--gold-dim) !important;
        }

        .btn-secondary-wrap .ui-button .ui-button-icon-left { color: inherit !important; }

        /* ── DIALOG ── */
        .ui-dialog.ui-widget {
            border-radius: var(--radius-xl) !important;
            border: 1px solid var(--border) !important;
            box-shadow: var(--shadow-lg) !important;
            overflow: hidden !important;
            font-family: 'DM Sans', sans-serif !important;
        }

        .ui-dialog .ui-dialog-titlebar {
            background: var(--sidebar-bg) !important;
            border: none !important;
            border-bottom: 1px solid rgba(255,255,255,.06) !important;
            padding: 17px 22px !important;
        }

        .ui-dialog .ui-dialog-title {
            font-family: 'Playfair Display', serif !important;
            font-size: 15.5px !important;
            font-weight: 600 !important;
            color: var(--gold) !important;
            letter-spacing: .01em !important;
        }

        .ui-dialog .ui-dialog-titlebar-close {
            color: rgba(255,255,255,.38) !important;
            border-radius: 6px !important;
            transition: var(--transition) !important;
        }

        .ui-dialog .ui-dialog-titlebar-close:hover {
            color: rgba(255,255,255,.78) !important;
            background: rgba(255,255,255,.08) !important;
        }

        .ui-dialog .ui-dialog-content {
            padding: 22px !important;
            background: var(--surface) !important;
        }

        .ui-dialog .ui-dialog-footer {
            padding: 14px 22px !important;
            background: var(--surface-2) !important;
            border-top: 1px solid var(--border-subtle) !important;
            display: flex !important;
            justify-content: flex-end !important;
            gap: 8px !important;
        }

        .edit-form-grid {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 14px 18px;
            align-items: center;
        }

        .edit-form-grid label {
            font-size: 10.5px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .09em;
        }

        .edit-form-grid .ui-inputtext {
            width: 100% !important;
            border: 1.5px solid var(--border) !important;
            border-radius: var(--radius-sm) !important;
            padding: 9px 12px !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 13px !important;
            color: var(--text-primary) !important;
            background: var(--surface-2) !important;
            transition: var(--transition) !important;
            box-shadow: none !important;
        }

        .edit-form-grid .ui-inputtext:focus {
            border-color: var(--gold) !important;
            background: var(--surface) !important;
            outline: none !important;
            box-shadow: 0 0 0 3px rgba(201,168,76,.10) !important;
        }

        .edit-form-grid .ui-message-error-detail,
        .edit-form-grid .ui-message-error {
            font-size: 11px !important;
            color: var(--danger-text) !important;
            font-family: 'DM Sans', sans-serif !important;
            grid-column: 2;
            margin-top: -8px;
        }

        .dialog-section-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: .12em;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 6px;
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dialog-section-label::before {
            content: '';
            display: block;
            width: 14px;
            height: 1.5px;
            background: var(--gold);
            opacity: .6;
        }

        .dialog-btn-update {
            background: var(--gold) !important;
            border: 1px solid var(--gold) !important;
            color: #1A1400 !important;
            border-radius: var(--radius-sm) !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 12.5px !important;
            font-weight: 700 !important;
            padding: 8px 20px !important;
            box-shadow: 0 2px 8px rgba(201,168,76,.26) !important;
            transition: var(--transition) !important;
        }

        .dialog-btn-update:hover {
            background: var(--gold-hover) !important;
            border-color: var(--gold-hover) !important;
            box-shadow: 0 4px 14px rgba(201,168,76,.34) !important;
        }

        .dialog-btn-update .ui-button-icon-left { color: inherit !important; }

        .dialog-btn-cancel {
            background: transparent !important;
            border: 1px solid var(--border) !important;
            color: var(--text-secondary) !important;
            border-radius: var(--radius-sm) !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 12.5px !important;
            font-weight: 500 !important;
            padding: 8px 17px !important;
            box-shadow: none !important;
            transition: var(--transition) !important;
        }

        .dialog-btn-cancel:hover {
            background: var(--surface-2) !important;
            color: var(--text-primary) !important;
            border-color: #C8C8D0 !important;
        }

        .dialog-btn-cancel .ui-button-icon-left { color: inherit !important; }

        /* RESPONSIVE */
        @media (max-width: 1080px) {
            .content { padding: 20px; }
            .topbar  { padding: 0 20px; }
        }

        @media (max-width: 768px) {
            .topbar         { padding: 0 14px; height: 60px; }
            .content        { padding: 14px; }
            .topbar-title   { display: none; }
            .topbar-sep     { display: none; }

            .back-btn { padding: 9px 14px; font-size: 13px; }

            .page-banner {
                flex-direction: column;
                align-items: flex-start;
                gap: 18px;
                padding: 22px 24px;
            }

            .profile-grid { grid-template-columns: 1fr; }
            .profile-field { border-right: none !important; border-bottom: 1px solid var(--border-subtle) !important; }
            .profile-field:last-child { border-bottom: none !important; }

            .action-row { flex-direction: column-reverse; align-items: stretch; }
            .action-row-left,
            .action-row-right { width: 100%; }
            .btn-gold-wrap .ui-button.ui-widget,
            .btn-secondary-wrap .ui-button.ui-widget { width: 100% !important; justify-content: center !important; }

            .edit-form-grid { grid-template-columns: 1fr; gap: 6px 0; }
            .edit-form-grid label { margin-top: 10px; margin-bottom: -4px; }
            .edit-form-grid label:first-of-type { margin-top: 0; }
        }
    </style>
</h:head>

<h:body>
<h:form id="profileForm">

    <div class="main">

        <!-- TOPBAR -->
        <header class="topbar">
            <div class="topbar-left">
                <h:link outcome="/citizen/dashboard" styleClass="back-btn">
                    <i class="fa fa-arrow-left"></i>
                    <span>Back to Dashboard</span>
                </h:link>

                <span class="topbar-sep">/</span>

                <span class="topbar-title">My Profile</span>
            </div>

            <div class="topbar-right">
                <a href="notifications.jsf" class="icon-btn" aria-label="Notifications" style="position:relative;">
                    <i class="fa fa-bell"></i>
                    <span class="notif-dot"></span>
                </a>
                <div class="logout-btn-wrap">
                    <p:commandButton value="Logout"
                                     icon="pi pi-sign-out"
                                     action="#{loginBean.logout}"/>
                </div>
            </div>
        </header>

        <!-- CONTENT -->
        <div class="content">

            <!-- BANNER -->
            <div class="page-banner">

                <div class="avatar-large">
                    <h:outputText value="#{profileBean.user.fullName != null
                                          ? profileBean.user.fullName.substring(0,1).toUpperCase()
                                          : 'U'}"/>
                </div>

                <div class="banner-info">
                    <div class="banner-eyebrow">
                        <span>Citizen Profile</span>
                    </div>
                    <div class="user-name">
                        <h:outputText value="#{profileBean.user.fullName}"/>
                    </div>
                    <div class="user-meta">
                        <span><h:outputText value="@#{profileBean.user.username}"/></span>
                        ·
                        <span>Government Grievance Redressal System</span>
                    </div>
                    <div class="banner-badge">
                        <i class="fa fa-shield-alt"></i>
                        Verified Citizen
                    </div>
                </div>

            </div>

            <!-- PROFILE DETAILS -->
            <div class="section-card">

                <div class="section-head">
                    <span class="section-title">
                        <i class="fa fa-id-card"></i>
                        Personal Information
                    </span>
                </div>

                <div class="profile-grid">

                    <div class="profile-field">
                        <span class="field-label">Full Name</span>
                        <span class="field-value">
                            <i class="fa fa-user"></i>
                            <h:outputText value="#{profileBean.user.fullName}"/>
                        </span>
                    </div>

                    <div class="profile-field">
                        <span class="field-label">Username</span>
                        <span class="field-value">
                            <i class="fa fa-at"></i>
                            <h:outputText value="#{profileBean.user.username}"/>
                        </span>
                    </div>

                    <div class="profile-field">
                        <span class="field-label">Email Address</span>
                        <span class="field-value">
                            <i class="fa fa-envelope"></i>
                            <h:outputText value="#{profileBean.user.email}"/>
                        </span>
                    </div>

                    <div class="profile-field">
                        <span class="field-label">Mobile Number</span>
                        <span class="field-value">
                            <i class="fa fa-phone"></i>
                            <h:outputText value="#{profileBean.user.mobile}"/>
                        </span>
                    </div>

                </div>

                <!-- ACTION ROW -->
                <div class="action-row">

                    <div class="action-row-left">
                        <div class="btn-secondary-wrap">
                            <p:button value="Change Password"
                                      icon="pi pi-lock"
                                      outcome="/citizen/changePassword"/>
                        </div>
                    </div>

                    <div class="action-row-right">
                        <div class="btn-gold-wrap">
                            <p:commandButton
                                value="Edit Profile"
                                icon="pi pi-user-edit"
                                type="button"
                                onclick="PF('editProfileDlg').show();"/>
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- EDIT PROFILE DIALOG -->
    <p:dialog header="Edit Profile"
              widgetVar="editProfileDlg"
              modal="true"
              closable="true"
              resizable="false"
              draggable="true"
              width="600"
              appendTo="@(body)"
              dynamic="false"
              responsive="true">

        <div class="edit-form-grid">

            <div class="dialog-section-label">Account Details</div>

            <h:outputLabel for="fullName" value="Full Name"/>
            <p:inputText id="fullName"
                         value="#{profileBean.user.fullName}"
                         required="true"
                         requiredMessage="Please enter your full name."
                         validatorMessage="Full Name should contain only letters and spaces (3-50 characters).">
                <f:validateRegex pattern="^[A-Za-z ]{3,50}$"/>
            </p:inputText>

            <h:outputLabel for="email" value="Email"/>
            <p:inputText id="email"
                         value="#{profileBean.user.email}"
                         required="true"
                         requiredMessage="Please enter your email address."
                         validatorMessage="Please enter a valid email address.">
                <f:validateRegex pattern="^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+$"/>
            </p:inputText>

            <h:outputLabel for="mobile" value="Mobile"/>
            <p:inputText id="mobile"
                         value="#{profileBean.user.mobile}"
                         required="true"
                         requiredMessage="Please enter your mobile number."
                         validatorMessage="Mobile number must contain exactly 10 digits.">
                <f:validateRegex pattern="^[0-9]{10}$"/>
            </p:inputText>

            <h:outputLabel for="username" value="Username"/>
            <p:inputText id="username"
                         value="#{profileBean.user.username}"
                         required="true"
                         requiredMessage="Please enter a username."
                         validatorMessage="Username must be between 4 and 20 characters.">
                <f:validateLength minimum="4" maximum="20"/>
            </p:inputText>

        </div>

        <f:facet name="footer">
            <p:commandButton value="Update"
                             icon="pi pi-check"
                             action="#{profileBean.updateProfile}"
                             process="@form"
                             update="profileForm"
                             oncomplete="if(!args.validationFailed) PF('editProfileDlg').hide();"
                             styleClass="dialog-btn-update"/>

            <p:commandButton value="Cancel"
                             icon="pi pi-times"
                             type="button"
                             onclick="PF('editProfileDlg').hide();"
                             styleClass="dialog-btn-cancel"/>
        </f:facet>

    </p:dialog>

</h:form>
</h:body>
</html>
