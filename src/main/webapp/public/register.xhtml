<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Register</title>

    <h:outputStylesheet library="css" name="style.css"/>
</h:head>

<h:body>

<div class="auth-container">

    <div class="auth-card">

        <div class="auth-title">
            Citizen Registration
        </div>

        <h:form>

            <p:growl id="msg"/>

            <span class="field-label">Full Name</span>
            <p:inputText value="#{registerBean.fullname}" required="true"/>

            <span class="field-label">Email</span>
            <p:inputText value="#{registerBean.email}" required="true"/>

            <span class="field-label">Mobile</span>
            <p:inputText value="#{registerBean.mobile}" required="true"/>

            <span class="field-label">Username</span>
            <p:inputText value="#{registerBean.username}" required="true"/>

            <span class="field-label">Password</span>
            <p:password value="#{registerBean.password}"
                        toggleMask="true"
                        feedback="false"
                        required="true"/>

            <span class="field-label">Society</span>

            <p:selectOneMenu value="#{registerBean.societyId}">

                <f:selectItem itemLabel="Select Society"
                              itemValue=""/>

                <f:selectItems value="#{registerBean.societies}"
                               var="s"
                               itemLabel="#{s.societyName}"
                               itemValue="#{s.societyId}"/>

            </p:selectOneMenu>

            <br/><br/>

            <p:commandButton
                    value="Register"
                    action="#{registerBean.register()}"
                    update="msg"
                    styleClass="gold-btn"/>

            <div class="auth-links">

                <h:link outcome="/public/login.xhtml"
                        value="Already have an account?"/>

            </div>

        </h:form>

    </div>

</div>

</h:body>
</html>
