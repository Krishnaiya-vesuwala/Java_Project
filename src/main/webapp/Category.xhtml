<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Category Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&amp;family=Playfair+Display:wght@600;700&amp;display=swap"
          rel="stylesheet"/>

    <style>
        :root {
            --gold:            #C9A84C;
            --gold-hover:      #B8962E;
            --gold-dim:        #9A7A28;
            --gold-bg:         rgba(201,168,76,.07);
            --gold-bg2:        rgba(201,168,76,.13);
            --gold-border:     rgba(201,168,76,.28);
            --sidebar-bg:      #161618;
            --surface:         #FFFFFF;
            --surface-2:       #F8F8FA;
            --bg:              #F2F3F6;
            --text-primary:    #16161A;
            --text-secondary:  #52525B;
            --text-muted:      #8A8A96;
            --border:          #E4E4E8;
            --border-subtle:   #EFEFEF;
            --success-bg:      #EEF6F1;
            --success-text:    #1F6E3A;
            --success-border:  rgba(31,110,58,.18);
            --danger-bg:       #FDF1F1;
            --danger-text:     #9B2424;
            --danger-border:   rgba(155,36,36,.18);
            --dept-bg:         #F0F7FF;
            --dept-text:       #1565C0;
            --dept-border:     rgba(21,101,192,.20);
            --radius-sm:  8px;
            --radius-md:  12px;
            --radius-lg:  16px;
            --radius-xl:  20px;
            --shadow-xs:  0 1px 3px rgba(0,0,0,.06);
            --shadow-sm:  0 2px 8px rgba(0,0,0,.07);
            --shadow-lg:  0 8px 40px rgba(0,0,0,.13);
            --transition: all .18s ease;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text-primary);
            line-height: 1.5; -webkit-font-smoothing: antialiased;
        }

        .main { display: flex; flex-direction: column; min-height: 100vh; }

        /* TOPBAR */
        .topbar {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 0 28px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 40;
            box-shadow: var(--shadow-xs); flex-shrink: 0;
        }
        .topbar-left { display: flex; align-items: center; gap: 16px; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 9px 18px; border-radius: var(--radius-sm);
            border: 1px solid var(--gold-border); background: var(--gold-bg);
            color: var(--gold-dim); text-decoration: none;
            font-size: 13px; font-weight: 600;
            transition: var(--transition); letter-spacing: .01em;
        }
        .back-btn i { font-size: 12px; color: var(--gold); transition: var(--transition); }
        .back-btn:hover {
            background: var(--gold-bg2); border-color: rgba(201,168,76,.44);
            color: var(--gold-hover); box-shadow: 0 2px 10px rgba(201,168,76,.18);
            transform: translateX(-2px);
        }
        .back-btn:hover i { color: var(--gold-hover); }
        .topbar-sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
        .topbar-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 18px; color: var(--text-primary);
            font-weight: 600; letter-spacing: -.01em;
        }
        .topbar-right { display: flex; align-items: center; gap: 10px; }
        .icon-btn {
            width: 38px; height: 38px; border-radius: var(--radius-sm);
            border: 1px solid var(--border); background: var(--surface);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-muted);
            font-size: 14px; transition: var(--transition); position: relative;
        }
        .icon-btn:hover { background: var(--surface-2); color: var(--text-primary); border-color: #D0D0D6; }
        .notif-dot {
            position: absolute; top: 8px; right: 8px;
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--gold); border: 1.5px solid var(--surface);
        }
        .btn-logout {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 9px 16px; border-radius: var(--radius-sm);
            border: 1px solid var(--border); background: var(--surface);
            color: var(--text-secondary); text-decoration: none;
            font-size: 13px; font-weight: 500;
            transition: var(--transition); cursor: pointer;
        }
        .btn-logout i { font-size: 12px; color: var(--text-muted); transition: var(--transition); }
        .btn-logout:hover { background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger-text); }
        .btn-logout:hover i { color: var(--danger-text); }

        /* CONTENT */
        .content {
            padding: 28px 32px; display: flex; flex-direction: column;
            gap: 22px; flex: 1; max-width: 1400px; width: 100%; margin: 0 auto;
        }

        /* PAGE HEADER */
        .page-header {
            background: var(--sidebar-bg); border-radius: var(--radius-lg);
            padding: 24px 28px; display: flex; align-items: center;
            justify-content: space-between; position: relative; overflow: hidden;
        }
        .page-header::before {
            content: ''; position: absolute; right: -40px; top: -40px;
            width: 190px; height: 190px; border-radius: 50%;
            background: radial-gradient(circle, rgba(201,168,76,.09) 0%, transparent 70%);
            pointer-events: none;
        }
        .page-header::after {
            content: ''; position: absolute; left: -20px; bottom: -55px;
            width: 140px; height: 140px; border-radius: 50%;
            background: radial-gradient(circle, rgba(201,168,76,.04) 0%, transparent 70%);
            pointer-events: none;
        }
        .page-header-left { position: relative; z-index: 1; }
        .page-header-eyebrow { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .page-header-eyebrow::before {
            content: ''; display: block; width: 16px; height: 1.5px;
            background: var(--gold); opacity: .6;
        }
        .page-header-eyebrow span {
            font-size: 10px; font-weight: 600; color: var(--gold);
            text-transform: uppercase; letter-spacing: .12em;
        }
        .page-header h2 {
            font-family: 'Playfair Display', serif; font-size: 22px;
            color: #fff; font-weight: 600; margin-bottom: 5px; line-height: 1.3;
        }
        .page-header p { font-size: 13px; color: rgba(255,255,255,.36); }
        .page-header-actions { position: relative; z-index: 1; }

        .add-btn-wrap .ui-button.ui-widget {
            background: var(--gold) !important; border: 1px solid var(--gold) !important;
            color: #1A1400 !important; border-radius: var(--radius-md) !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 14px !important; font-weight: 600 !important;
            padding: 12px 22px !important; transition: var(--transition) !important;
            box-shadow: 0 4px 16px rgba(201,168,76,.32) !important;
            letter-spacing: .01em !important;
        }
        .add-btn-wrap .ui-button.ui-widget:hover {
            background: var(--gold-hover) !important;
            border-color: var(--gold-hover) !important;
            box-shadow: 0 6px 22px rgba(201,168,76,.42) !important;
            transform: translateY(-1px);
        }
        .add-btn-wrap .ui-button .ui-button-icon-left { color: inherit !important; font-size: 14px !important; }

        /* TABLE CARD */
        .table-card {
            background: var(--surface); border-radius: var(--radius-lg);
            border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow-sm);
        }
        .table-card-head {
            padding: 16px 24px; border-bottom: 1px solid var(--border-subtle);
            display: flex; align-items: center; justify-content: space-between;
        }
        .table-card-title-group { display: flex; align-items: center; gap: 10px; }
        .table-card-title { font-size: 14px; font-weight: 600; color: var(--text-primary); letter-spacing: -.01em; }
        .count-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 20px;
            background: var(--gold-bg); border: 1px solid var(--gold-border);
            color: var(--gold-dim); font-size: 11px; font-weight: 600;
        }
        .count-badge i { font-size: 10px; }

        /* DATATABLE */
        .custom-table .ui-datatable,
        .custom-table .ui-datatable table { border: none !important; border-collapse: collapse !important; width: 100% !important; }
        .custom-table .ui-datatable .ui-datatable-header { display: none !important; }
        .custom-table .ui-datatable thead th,
        .custom-table .ui-datatable thead .ui-state-default {
            background: var(--surface-2) !important; border: none !important;
            border-bottom: 1px solid var(--border) !important;
            padding: 11px 20px !important; font-size: 10.5px !important;
            font-weight: 700 !important; color: var(--text-muted) !important;
            text-transform: uppercase !important; letter-spacing: .09em !important;
            font-family: 'DM Sans', sans-serif !important; white-space: nowrap !important;
        }
        .custom-table .ui-datatable tbody td {
            border: none !important; border-bottom: 1px solid var(--border-subtle) !important;
            padding: 13px 20px !important; font-size: 13px !important;
            font-family: 'DM Sans', sans-serif !important;
            color: var(--text-primary) !important; vertical-align: middle !important;
        }
        .custom-table .ui-datatable tbody tr:last-child td { border-bottom: none !important; }
        .custom-table .ui-datatable tbody tr:hover td { background: #FAFAFA !important; }
        .custom-table .ui-paginator {
            border: none !important; border-top: 1px solid var(--border-subtle) !important;
            background: var(--surface) !important; padding: 11px 20px !important;
        }
        .custom-table .ui-paginator .ui-paginator-page,
        .custom-table .ui-paginator .ui-paginator-next,
        .custom-table .ui-paginator .ui-paginator-prev,
        .custom-table .ui-paginator .ui-paginator-first,
        .custom-table .ui-paginator .ui-paginator-last {
            border-radius: var(--radius-sm) !important; border: 1px solid var(--border) !important;
            background: transparent !important; color: var(--text-secondary) !important;
            font-family: 'DM Sans', sans-serif !important; font-size: 12px !important;
            font-weight: 500 !important; min-width: 30px !important; height: 30px !important;
            margin: 0 1px !important; transition: var(--transition) !important;
        }
        .custom-table .ui-paginator .ui-paginator-page:hover,
        .custom-table .ui-paginator .ui-paginator-next:hover,
        .custom-table .ui-paginator .ui-paginator-prev:hover {
            background: var(--surface-2) !important; border-color: #D0D0D6 !important;
            color: var(--text-primary) !important;
        }
        .custom-table .ui-paginator .ui-state-active {
            background: var(--gold) !important; border-color: var(--gold) !important;
            color: #1A1400 !important; font-weight: 700 !important;
            box-shadow: 0 2px 8px rgba(201,168,76,.26) !important;
        }

        /* CELL ELEMENTS */
        .cat-id {
            font-weight: 700; color: var(--gold-dim); font-size: 12px;
            background: var(--gold-bg); padding: 3px 9px; border-radius: 6px;
            border: 1px solid var(--gold-border); display: inline-block;
        }
        .cat-cell { display: flex; align-items: center; gap: 11px; }
        .cat-icon {
            width: 38px; height: 38px; border-radius: 10px;
            background: var(--gold-bg2); border: 1px solid var(--gold-border);
            display: flex; align-items: center; justify-content: center;
            color: var(--gold-dim); font-size: 14px; flex-shrink: 0;
        }
        .cat-name { font-weight: 600; font-size: 13px; color: var(--text-primary); line-height: 1.3; }
        .dept-pill {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 10px; border-radius: 20px;
            background: var(--dept-bg); color: var(--dept-text);
            font-size: 12px; font-weight: 500;
            border: 1px solid var(--dept-border);
        }
        .dept-pill i { font-size: 10px; }

        /* ACTION BUTTONS */
        .action-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .action-group .ui-button.ui-widget {
            border-radius: var(--radius-sm) !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 11.5px !important; font-weight: 500 !important;
            padding: 5px 11px !important; transition: var(--transition) !important;
            box-shadow: none !important; letter-spacing: .01em !important;
        }
        .btn-edit-wrap .ui-button.ui-widget { background: var(--gold-bg) !important; border: 1px solid var(--gold-border) !important; color: var(--gold-dim) !important; }
        .btn-edit-wrap .ui-button.ui-widget:hover { background: var(--gold-bg2) !important; border-color: rgba(201,168,76,.44) !important; color: var(--gold-hover) !important; }
        .btn-edit-wrap .ui-button .ui-button-icon-left { color: inherit !important; }
        .btn-delete-wrap .ui-button.ui-widget { background: transparent !important; border: 1px solid var(--danger-border) !important; color: var(--danger-text) !important; }
        .btn-delete-wrap .ui-button.ui-widget:hover { background: var(--danger-bg) !important; border-color: rgba(155,36,36,.32) !important; }
        .btn-delete-wrap .ui-button .ui-button-icon-left { color: inherit !important; }

        /* ═══════════════════════════════════════
           DIALOGS
        ═══════════════════════════════════════ */
        .ui-dialog.ui-widget {
            border-radius: var(--radius-xl) !important;
            border: 1px solid var(--border) !important;
            box-shadow: var(--shadow-lg) !important;
            overflow: hidden !important;
            font-family: 'DM Sans', sans-serif !important;
        }
        .ui-dialog .ui-dialog-titlebar {
            background: var(--sidebar-bg) !important; border: none !important;
            border-bottom: 1px solid rgba(255,255,255,.06) !important;
            padding: 17px 22px !important;
        }
        .ui-dialog .ui-dialog-title {
            font-family: 'Playfair Display', serif !important;
            font-size: 15.5px !important; font-weight: 600 !important;
            color: var(--gold) !important; letter-spacing: .01em !important;
        }
        .ui-dialog .ui-dialog-titlebar-close {
            color: rgba(255,255,255,.36) !important; border-radius: 6px !important;
            transition: var(--transition) !important;
        }
        .ui-dialog .ui-dialog-titlebar-close:hover {
            color: rgba(255,255,255,.76) !important;
            background: rgba(255,255,255,.08) !important;
        }

        /* Scrollable content area */
        .ui-dialog .ui-dialog-content {
            background: var(--surface) !important;
            padding: 0 !important;
            max-height: 75vh !important;
            overflow-y: auto !important;
            overflow-x: hidden !important;
        }

        /* Thin gold scrollbar */
        .ui-dialog .ui-dialog-content::-webkit-scrollbar { width: 4px; }
        .ui-dialog .ui-dialog-content::-webkit-scrollbar-track { background: var(--surface-2); }
        .ui-dialog .ui-dialog-content::-webkit-scrollbar-thumb { background: var(--gold-border); border-radius: 10px; }
        .ui-dialog .ui-dialog-content::-webkit-scrollbar-thumb:hover { background: var(--gold); }

        /* Dialog inner wrapper */
        .dlg-wrap { display: flex; flex-direction: column; min-height: 100%; }

        .dlg-body {
            padding: 22px; display: flex;
            flex-direction: column; gap: 15px; flex: 1;
        }

        .form-row { display: flex; flex-direction: column; gap: 6px; }

        .form-label {
            font-size: 10.5px; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: .09em;
        }

        /* ── Inline field error ── */
        .field-error .ui-message-error,
        .field-error .ui-message {
            display: inline-flex !important;
            align-items: center; gap: 5px;
            background: transparent !important; border: none !important;
            color: var(--danger-text) !important;
            font-size: 11.5px !important; font-weight: 500 !important;
            padding: 2px 0 0 0 !important; margin: 0 !important;
            font-family: 'DM Sans', sans-serif !important;
        }
        .field-error .ui-message-error-icon,
        .field-error .ui-message-error-detail { color: var(--danger-text) !important; }

        /* Inputs */
        .dlg-body .ui-inputtext,
        .dlg-body .ui-selectonemenu.ui-widget {
            width: 100% !important; border: 1.5px solid var(--border) !important;
            border-radius: var(--radius-sm) !important; padding: 9px 12px !important;
            font-family: 'DM Sans', sans-serif !important; font-size: 13px !important;
            color: var(--text-primary) !important; background: var(--surface-2) !important;
            transition: var(--transition) !important; box-shadow: none !important;
        }
        .dlg-body .ui-inputtext:focus {
            border-color: var(--gold) !important; background: var(--surface) !important;
            outline: none !important; box-shadow: 0 0 0 3px rgba(201,168,76,.10) !important;
        }
        .dlg-body .ui-selectonemenu.ui-widget.ui-state-focus {
            border-color: var(--gold) !important;
            box-shadow: 0 0 0 3px rgba(201,168,76,.10) !important;
        }
        .dlg-body .ui-selectonemenu .ui-selectonemenu-label {
            background: transparent !important; border: none !important;
            padding: 9px 12px !important; font-family: 'DM Sans', sans-serif !important;
            font-size: 13px !important; color: var(--text-primary) !important;
        }
        .dlg-body .ui-selectonemenu .ui-selectonemenu-trigger {
            background: transparent !important; border: none !important;
            color: var(--text-muted) !important; width: 30px !important;
        }

        /* Invalid highlight */
        .dlg-body .ui-state-error {
            border-color: var(--danger-text) !important;
            background: #FFF5F5 !important;
            box-shadow: 0 0 0 3px rgba(155,36,36,.08) !important;
        }

        /* Dialog footer — sticky */
        .dlg-footer {
            display: flex; align-items: center;
            justify-content: flex-end; gap: 8px;
            padding: 14px 22px;
            border-top: 1px solid var(--border-subtle);
            background: var(--surface-2);
            position: sticky; bottom: 0;
        }

        .btn-cancel-wrap .ui-button.ui-widget {
            background: transparent !important; border: 1px solid var(--border) !important;
            color: var(--text-secondary) !important; border-radius: var(--radius-sm) !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 12.5px !important; font-weight: 500 !important;
            padding: 8px 17px !important; transition: var(--transition) !important;
            box-shadow: none !important;
        }
        .btn-cancel-wrap .ui-button.ui-widget:hover {
            background: var(--surface-2) !important; border-color: #C8C8D0 !important;
            color: var(--text-primary) !important;
        }
        .btn-save-wrap .ui-button.ui-widget {
            background: var(--gold) !important; border: 1px solid var(--gold) !important;
            color: #1A1400 !important; border-radius: var(--radius-sm) !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 12.5px !important; font-weight: 700 !important;
            padding: 8px 20px !important; transition: var(--transition) !important;
            box-shadow: 0 2px 8px rgba(201,168,76,.26) !important;
        }
        .btn-save-wrap .ui-button.ui-widget:hover {
            background: var(--gold-hover) !important;
            border-color: var(--gold-hover) !important;
            box-shadow: 0 4px 14px rgba(201,168,76,.34) !important;
        }
        .btn-save-wrap .ui-button .ui-button-icon-left { color: inherit !important; }

        /* RESPONSIVE */
        @media (max-width: 1080px) { .content { padding: 20px; } .topbar { padding: 0 20px; } }
        @media (max-width: 768px) {
            .topbar { padding: 0 14px; height: 56px; }
            .content { padding: 14px; }
            .topbar-title { display: none; }
            .topbar-sep   { display: none; }
            .back-btn { padding: 7px 12px; font-size: 12px; }
            .back-btn span { display: none; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 14px; }
            .page-header-actions { width: 100%; }
            .dlg-body { min-width: unset; width: 100%; }
            .ui-dialog .ui-dialog-content { max-height: 80vh !important; }
        }
        @media (max-width: 480px) {
            .action-group { gap: 4px; }
            .action-group .ui-button.ui-widget { font-size: 11px !important; padding: 5px 8px !important; }
            .btn-logout span { display: none; }
        }
    </style>
</h:head>

<h:body>

    <div class="main">

        <h:form id="categoryForm">

            <p:growl id="msg" showDetail="true" life="4000"/>

            <!-- TOPBAR -->
            <header class="topbar">
                <div class="topbar-left">
                    <a href="adminDashboard.jsf" class="back-btn">
                        <i class="fa fa-arrow-left"></i>
                        <span>Back to Dashboard</span>
                    </a>
                    <div class="topbar-sep"></div>
                    <span class="topbar-title">Category Management</span>
                </div>
                <div class="topbar-right">
                    <button class="icon-btn" type="button"
                            aria-label="Notifications"
                            style="position:relative;">
                        <i class="fa fa-bell"></i>
                        <span class="notif-dot"></span>
                    </button>
                    <a href="#" class="btn-logout">
                        <i class="fa fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </a>
                </div>
            </header>

            <!-- CONTENT -->
            <div class="content">

                <!-- PAGE HEADER -->
                <div class="page-header">
                    <div class="page-header-left">
                        <div class="page-header-eyebrow">
                            <span>Operations</span>
                        </div>
                        <h2>Category Management</h2>
                        <p>Create, edit and manage complaint categories by department.</p>
                    </div>
                    <div class="page-header-actions">
                        <div class="add-btn-wrap">
                            <p:commandButton
                                value="Add Category"
                                icon="pi pi-plus"
                                process="@this"
                                action="#{categoryManagementCDI.prepareCreate}"
                                update=":categoryForm:addDlg"
                                oncomplete="PF('addDialog').show()"/>
                        </div>
                    </div>
                </div>

                <!-- TABLE CARD -->
                <div class="table-card">
                    <div class="table-card-head">
                        <div class="table-card-title-group">
                            <span class="table-card-title">All Categories</span>
                            <span class="count-badge">
                                <i class="fa fa-tag"></i>
                                Category Records
                            </span>
                        </div>
                    </div>

                    <div class="custom-table">
                        <p:dataTable
                            id="categoryTable"
                            value="#{categoryManagementCDI.categories}"
                            var="c"
                            paginator="true"
                            rows="10"
                            paginatorTemplate="{FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink}"
                            emptyMessage="No categories found."
                            rowHover="true"
                            style="width:100%">

                            <p:column headerText="Cat ID" width="110">
                                <span class="cat-id">
                                    #<h:outputText value="#{c.categoryId}"/>
                                </span>
                            </p:column>

                            <p:column headerText="Category">
                                <div class="cat-cell">
                                    <div class="cat-icon">
                                        <i class="fa fa-tag"></i>
                                    </div>
                                    <div class="cat-name">
                                        <h:outputText value="#{c.categoryName}"/>
                                    </div>
                                </div>
                            </p:column>

                            <p:column headerText="Department">
                                <span class="dept-pill">
                                    <i class="fa fa-briefcase"></i>
                                    <h:outputText
                                        value="#{c.departmentId.departmentName}"/>
                                </span>
                            </p:column>

                            <p:column headerText="Actions" width="200">
                                <div class="action-group">

                                    <!--
                                        KEY: update the edit dialog BEFORE
                                        showing it so bean fields are rendered
                                        fresh with the selected row's data.
                                    -->
                                    <div class="btn-edit-wrap">
                                        <p:commandButton
                                            value="Edit"
                                            icon="pi pi-pencil"
                                            process="@this"
                                            action="#{categoryManagementCDI.editCategory(c)}"
                                            update=":categoryForm:editDlg"
                                            oncomplete="PF('editDialog').show()"/>
                                    </div>

                                    <div class="btn-delete-wrap">
                                        <!-- delete button goes here if needed -->
                                    </div>

                                </div>
                            </p:column>

                        </p:dataTable>
                    </div>
                </div>

            </div>
            <!-- /content -->

            <!-- ══════════════════════════════════
                 ADD CATEGORY DIALOG
            ══════════════════════════════════ -->
            <p:dialog
                id="addDlg"
                widgetVar="addDialog"
                header="Create New Category"
                modal="true"
                width="460"
                resizable="false"
                closable="true"
                responsive="true">

                <div class="dlg-wrap">

                    <div class="dlg-body">

                        <!-- Category Name -->
                        <div class="form-row">
                            <label class="form-label"
                                   for="addCategoryName">
                                Category Name
                            </label>
                            <p:inputText
                                id="addCategoryName"
                                value="#{categoryManagementCDI.newCategoryName}"
                                placeholder="Enter category name"
                                required="true"
                                requiredMessage="Category Name is required."
                                maxlength="100"/>
                            <div class="field-error">
                                <p:message for="addCategoryName"
                                           display="text"/>
                            </div>
                        </div>

                        <!-- Department -->
                        <div class="form-row">
                            <label class="form-label"
                                   for="addDepartmentId">
                                Department
                            </label>
                            <p:selectOneMenu
                                id="addDepartmentId"
                                value="#{categoryManagementCDI.newDepartmentId}"
                                required="true"
                                requiredMessage="Please select a Department.">
                                <f:selectItem
                                    itemLabel="Select Department"
                                    itemValue="#{null}"
                                    noSelectionOption="true"/>
                                <f:selectItems
                                    value="#{categoryManagementCDI.departments}"
                                    var="d"
                                    itemLabel="#{d.departmentName}"
                                    itemValue="#{d.departmentId}"/>
                            </p:selectOneMenu>
                            <div class="field-error">
                                <p:message for="addDepartmentId"
                                           display="text"/>
                            </div>
                        </div>

                    </div>
                    <!-- /dlg-body -->

                    <div class="dlg-footer">
                        <div class="btn-cancel-wrap">
                            <p:commandButton
                                value="Cancel"
                                type="button"
                                onclick="PF('addDialog').hide()"/>
                        </div>
                        <div class="btn-save-wrap">
                            <!--
                                process="addDlg"      → submits only add dialog inputs
                                update="addDlg ..."   → refreshes dialog (shows errors)
                                                         + table + growl
                            -->
                            <p:commandButton
                                value="Save Category"
                                icon="pi pi-check"
                                process="addDlg"
                                action="#{categoryManagementCDI.createCategory}"
                                update="addDlg
                                        :categoryForm:categoryTable
                                        :categoryForm:msg"
                                oncomplete="if(!args.validationFailed)
                                    PF('addDialog').hide()"/>
                        </div>
                    </div>

                </div>
                <!-- /dlg-wrap -->

            </p:dialog>

            <!-- ══════════════════════════════════
                 EDIT CATEGORY DIALOG
            ══════════════════════════════════ -->
            <p:dialog
                id="editDlg"
                widgetVar="editDialog"
                header="Edit Category"
                modal="true"
                width="460"
                resizable="false"
                closable="true"
                responsive="true">

                <div class="dlg-wrap">

                    <div class="dlg-body">

                        <!--
                            Hidden field carries selectedCategoryId
                            across the request so updateCategory()
                            always has the correct ID available,
                            even after loadData() reloads the list.
                        -->
                        <p:inputText
                            id="editHiddenId"
                            value="#{categoryManagementCDI.selectedCategoryId}"
                            style="display:none !important;"
                            readonly="true"/>

                        <!-- Category Name -->
                        <div class="form-row">
                            <label class="form-label"
                                   for="editCategoryName">
                                Category Name
                            </label>
                            <p:inputText
                                id="editCategoryName"
                                value="#{categoryManagementCDI.editCategoryName}"
                                placeholder="Enter category name"
                                required="true"
                                requiredMessage="Category Name is required."
                                maxlength="100"/>
                            <div class="field-error">
                                <p:message for="editCategoryName"
                                           display="text"/>
                            </div>
                        </div>

                        <!-- Department -->
                        <div class="form-row">
                            <label class="form-label"
                                   for="editDepartmentId">
                                Department
                            </label>
                            <p:selectOneMenu
                                id="editDepartmentId"
                                value="#{categoryManagementCDI.editDepartmentId}"
                                required="true"
                                requiredMessage="Please select a Department.">
                                <f:selectItem
                                    itemLabel="Select Department"
                                    itemValue="#{null}"
                                    noSelectionOption="true"/>
                                <f:selectItems
                                    value="#{categoryManagementCDI.departments}"
                                    var="d"
                                    itemLabel="#{d.departmentName}"
                                    itemValue="#{d.departmentId}"/>
                            </p:selectOneMenu>
                            <div class="field-error">
                                <p:message for="editDepartmentId"
                                           display="text"/>
                            </div>
                        </div>

                    </div>
                    <!-- /dlg-body -->

                    <div class="dlg-footer">
                        <div class="btn-cancel-wrap">
                            <p:commandButton
                                value="Cancel"
                                type="button"
                                onclick="PF('editDialog').hide()"/>
                        </div>
                        <div class="btn-save-wrap">
                            <!--
                                process="editDlg"     → submits edit dialog inputs
                                                         INCLUDING the hidden ID field
                                update="editDlg ..."  → refreshes dialog in-place
                                                         so p:message shows errors
                            -->
                            <p:commandButton
                                value="Update Category"
                                icon="pi pi-check"
                                process="editDlg"
                                action="#{categoryManagementCDI.updateCategory}"
                                update="editDlg
                                        :categoryForm:categoryTable
                                        :categoryForm:msg"
                                oncomplete="if(!args.validationFailed)
                                    PF('editDialog').hide()"/>
                        </div>
                    </div>

                </div>
                <!-- /dlg-wrap -->

            </p:dialog>

            <!-- CONFIRM DIALOG -->
            <p:confirmDialog
                global="true"
                showEffect="fade"
                hideEffect="fade"
                responsive="true">
                <p:commandButton
                    value="Yes, Delete"
                    type="button"
                    styleClass="ui-confirmdialog-yes"
                    icon="pi pi-check"
                    style="background:#9B2424;border-color:#9B2424;
                           color:#fff;border-radius:8px;
                           font-family:'DM Sans',sans-serif;
                           font-size:12.5px;font-weight:600;
                           padding:7px 16px;"/>
                <p:commandButton
                    value="Cancel"
                    type="button"
                    styleClass="ui-confirmdialog-no"
                    icon="pi pi-times"
                    style="background:transparent;
                           border:1px solid #E4E4E8;
                           color:#52525B;border-radius:8px;
                           font-family:'DM Sans',sans-serif;
                           font-size:12.5px;font-weight:500;
                           padding:7px 16px;margin-left:6px;"/>
            </p:confirmDialog>

        </h:form>

    </div>

</h:body>
</html>
