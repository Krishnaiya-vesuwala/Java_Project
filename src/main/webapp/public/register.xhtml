<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Register</title>

    <h:outputStylesheet library="css" name="style.css"/>
</h:head>

<h:body>

<div class="auth-container">

    <div class="auth-card">

        <div class="auth-title">
            Citizen Registration
        </div>

        <h:form>

            <span class="field-label">Full Name</span>

            <p:inputText id="fullname"
                         value="#{registerBean.fullname}"
                         required="true"
                         requiredMessage="Please enter your full name."
                         validatorMessage="Full Name should contain only letters and spaces (3-50 characters).">

                <f:validateRegex pattern="^[A-Za-z ]{3,50}$"/>

                <p:ajax event="blur"
                        update="fullnameMsg"/>

            </p:inputText>

            <p:message id="fullnameMsg"
                       for="fullname"
                       display="text"/>



            <span class="field-label">Email</span>

            <p:inputText id="email"
                         value="#{registerBean.email}"
                         required="true"
                         requiredMessage="Please enter your email address."
                         validatorMessage="Please enter a valid email address.">

                <f:validateRegex pattern="^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+$"/>

                <p:ajax event="blur"
                        update="emailMsg"/>

            </p:inputText>

            <p:message id="emailMsg"
                       for="email"
                       display="text"/>


                  <span class="field-label">Username</span>

            <p:inputText id="username"
                         value="#{registerBean.username}"
                         required="true"
                         requiredMessage="Please enter a username."
                         validatorMessage="Username must be between 4 and 20 characters.">

                <f:validateLength minimum="4"
                                  maximum="20"/>

                <p:ajax event="blur"
                        update="usernameMsg"/>

            </p:inputText>

            <p:message id="usernameMsg"
                       for="username"
                       display="text"/>


            <span class="field-label">Mobile</span>

            <p:inputText id="mobile"
                         value="#{registerBean.mobile}"
                         required="true"
                         requiredMessage="Please enter your mobile number."
                         validatorMessage="Mobile number must contain exactly 10 digits.">

                <f:validateRegex pattern="^[0-9]{10}$"/>

                <p:ajax event="blur"
                        update="mobileMsg"/>

            </p:inputText>

            <p:message id="mobileMsg"
                       for="mobile"
                       display="text"/>


            <span class="field-label">Password</span>

            <p:password id="password"
                        value="#{registerBean.password}"
                        toggleMask="true"
                        feedback="true"
                        required="true"
                        requiredMessage="Please enter a password."
                        validatorMessage="Password must contain at least one uppercase letter, one lowercase letter, one number and be at least 8 characters long.">

                <f:validateRegex
                    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$"/>

                <p:ajax event="blur"
                        update="passwordMsg"/>

            </p:password>

            <p:message id="passwordMsg"
                       for="password"
                       display="text"/>


            <span class="field-label">Confirm Password</span>

            <p:password id="confirmPassword"
                        value="#{registerBean.confirmPassword}"
                        toggleMask="true"
                        feedback="false"
                        required="true"
                        requiredMessage="Please confirm your password.">

                <p:ajax event="blur"
                        update="confirmPasswordMsg"/>

            </p:password>

            <p:message id="confirmPasswordMsg"
                       for="confirmPassword"
                       display="text"/>

         
            
            <span class="field-label">Select Society</span>

            <p:selectOneMenu id="society"
                             value="#{registerBean.societyId}"
                             required="true"
                             requiredMessage="Please select your society.">

                <p:ajax event="change"
                        update="societyMsg"/>

                <f:selectItem itemLabel="Select Society"
                              itemValue="#{null}"
                              noSelectionOption="true"/>

                <f:selectItems value="#{registerBean.societies}"
                               var="s"
                               itemLabel="#{s.societyName}"
                               itemValue="#{s.societyId}"/>

            </p:selectOneMenu>

            <p:message id="societyMsg"
                       for="society"
                       display="text"/>

            <br/><br/>

            <p:commandButton
                    value="Register"
                    action="#{registerBean.register}"
                    update="@form"
                    styleClass="gold-btn"/>

            <div class="auth-links">

                <h:link outcome="/public/login.xhtml"
                        value="Already have an account?"/>

            </div>

        </h:form>

    </div>

</div>

</h:body>
</html>
