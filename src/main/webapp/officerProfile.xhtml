<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="jakarta.faces.core">

<h:head>
    <title>Officer Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&amp;family=Playfair+Display:wght@600;700&amp;display=swap"
          rel="stylesheet"/>

    <style>
        /* ═══════════════════════════════════════
           DESIGN TOKENS
        ═══════════════════════════════════════ */
        :root {
            --gold:            #C9A84C;
            --gold-hover:      #B8962E;
            --gold-dim:        #9A7A28;
            --gold-bg:         rgba(201,168,76,.07);
            --gold-bg2:        rgba(201,168,76,.13);
            --gold-border:     rgba(201,168,76,.28);

            --sidebar-bg:      #161618;
            --surface:         #FFFFFF;
            --surface-2:       #F8F8FA;
            --bg:              #F2F3F6;
            --text-primary:    #16161A;
            --text-secondary:  #52525B;
            --text-muted:      #8A8A96;
            --border:          #E4E4E8;
            --border-subtle:   #EFEFEF;

            --success-bg:      #EEF6F1;
            --success-text:    #1F6E3A;
            --success-border:  rgba(31,110,58,.18);

            --danger-bg:       #FDF1F1;
            --danger-text:     #9B2424;
            --danger-border:   rgba(155,36,36,.18);

            --info-bg:         #EEF3FF;
            --info-text:       #3A5BD9;
            --info-border:     rgba(58,91,217,.18);

            --radius-sm:  8px;
            --radius-md:  12px;
            --radius-lg:  16px;
            --radius-xl:  20px;

            --shadow-xs:  0 1px 3px rgba(0,0,0,.06);
            --shadow-sm:  0 2px 8px rgba(0,0,0,.07);
            --shadow-lg:  0 8px 40px rgba(0,0,0,.13);

            --transition: all .18s ease;
        }

        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ═══════════════════════════════════════
           MAIN LAYOUT
        ═══════════════════════════════════════ */
        .main {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ═══════════════════════════════════════
           TOPBAR  (identical to Admin Profile)
        ═══════════════════════════════════════ */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 30px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 40;
            box-shadow: var(--shadow-xs);
            flex-shrink: 0;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* Back button — exact match to admin */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--gold-border);
            background: var(--gold-bg);
            color: var(--gold-dim);
            text-decoration: none;
            font-size: 12.5px;
            font-weight: 600;
            transition: var(--transition);
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: .01em;
        }

        .back-btn:hover {
            background: var(--gold-bg2);
            border-color: rgba(201,168,76,.45);
            color: var(--gold-hover);
        }

        .back-btn i { font-size: 12px; }

        /* Breadcrumb */
        .topbar-breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .crumb-sep {
            font-size: 12px;
            color: var(--border);
        }

        .crumb-current {
            font-family: 'Playfair Display', serif;
            font-size: 17px;
            color: var(--text-primary);
            font-weight: 600;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon-btn {
            width: 36px; height: 36px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: transparent;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 14px;
            transition: var(--transition);
            position: relative;
        }

        .icon-btn:hover {
            background: var(--surface-2);
            color: var(--text-primary);
            border-color: #D8D8DC;
        }

        .notif-dot {
            position: absolute;
            top: 8px; right: 8px;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--gold);
            border: 1.5px solid var(--surface);
        }

        .btn-logout {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 12.5px;
            font-weight: 500;
            transition: var(--transition);
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-logout:hover {
            background: var(--danger-bg);
            border-color: var(--danger-border);
            color: var(--danger-text);
        }

        /* ═══════════════════════════════════════
           CONTENT
        ═══════════════════════════════════════ */
        .content {
            padding: 28px 32px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            flex: 1;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
        }

        /* ═══════════════════════════════════════
           PAGE BANNER (HERO)
        ═══════════════════════════════════════ */
        .page-banner {
            background: var(--sidebar-bg);
            border-radius: var(--radius-lg);
            padding: 28px 32px;
            display: flex;
            align-items: center;
            gap: 22px;
            position: relative;
            overflow: hidden;
        }

        .page-banner::before {
            content: '';
            position: absolute;
            right: -40px; top: -40px;
            width: 220px; height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle,
                rgba(201,168,76,.10) 0%, transparent 70%);
            pointer-events: none;
        }

        .page-banner::after {
            content: '';
            position: absolute;
            right: 100px; bottom: -60px;
            width: 140px; height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle,
                rgba(201,168,76,.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .avatar-large {
            width: 82px; height: 82px;
            border-radius: 50%;
            background: var(--gold-bg2);
            border: 2.5px solid var(--gold-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 700;
            color: var(--gold);
            flex-shrink: 0;
            z-index: 1;
            text-transform: uppercase;
        }

        .banner-info {
            z-index: 1;
            flex: 1;
        }

        .banner-eyebrow {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .banner-eyebrow::before {
            content: '';
            display: block;
            width: 16px; height: 1.5px;
            background: var(--gold);
            opacity: .6;
        }

        .banner-eyebrow span {
            font-size: 10px;
            font-weight: 600;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: .12em;
        }

        .banner-info .officer-name {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: #fff;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .banner-info .officer-meta {
            font-size: 13px;
            color: rgba(255,255,255,.40);
        }

        .banner-info .officer-meta span {
            color: rgba(255,255,255,.65);
            font-weight: 500;
        }

        .banner-badge {
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--gold-bg2);
            border: 1px solid var(--gold-border);
            color: var(--gold);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .banner-badge i { font-size: 10px; }

        /* ═══════════════════════════════════════
           SECTION CARD
        ═══════════════════════════════════════ */
        .section-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .section-head {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 9px;
            letter-spacing: -.01em;
        }

        .section-title i {
            color: var(--gold);
            font-size: 14px;
        }

        /* ═══════════════════════════════════════
           PROFILE GRID
        ═══════════════════════════════════════ */
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
        }

        .profile-field {
            padding: 18px 22px;
            border-bottom: 1px solid var(--border-subtle);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: var(--transition);
        }

        .profile-field:hover { background: #FAFAFA; }

        /* 3-column grid rules */
        .profile-field:nth-child(3n)        { border-right: none; }
        .profile-field:nth-last-child(-n+3) { border-bottom: none; }

        .field-label {
            font-size: 10.5px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .09em;
        }

        .field-value {
            font-size: 13.5px;
            color: var(--text-primary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: 1.4;
        }

        .field-value i {
            color: var(--gold-dim);
            font-size: 12px;
            width: 14px;
            flex-shrink: 0;
        }

        .field-value.highlight {
            color: var(--gold-dim);
            font-weight: 600;
        }

        .profile-field.empty {
            background: transparent !important;
            border-right: none;
            border-bottom: none;
            pointer-events: none;
        }

        /* ═══════════════════════════════════════
           ACTION ROW
        ═══════════════════════════════════════ */
        .action-row {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 16px 24px;
            border-top: 1px solid var(--border-subtle);
            background: var(--surface-2);
            flex-wrap: wrap;
        }

        .btn-gold-wrap .ui-button.ui-widget {
            background: var(--gold) !important;
            border: 1px solid var(--gold) !important;
            color: #1A1400 !important;
            border-radius: var(--radius-sm) !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 13px !important;
            font-weight: 700 !important;
            padding: 9px 20px !important;
            transition: var(--transition) !important;
            box-shadow: 0 2px 10px rgba(201,168,76,.28) !important;
            letter-spacing: .01em !important;
        }

        .btn-gold-wrap .ui-button.ui-widget:hover {
            background: var(--gold-hover) !important;
            border-color: var(--gold-hover) !important;
            box-shadow: 0 4px 16px rgba(201,168,76,.36) !important;
        }

        .btn-gold-wrap .ui-button .ui-button-icon-left {
            color: inherit !important;
        }

        /* ═══════════════════════════════════════
           DIALOG
        ═══════════════════════════════════════ */
        .ui-dialog.ui-widget {
            border-radius: var(--radius-xl) !important;
            border: 1px solid var(--border) !important;
            box-shadow: var(--shadow-lg) !important;
            overflow: hidden !important;
            font-family: 'DM Sans', sans-serif !important;
        }

        .ui-dialog .ui-dialog-titlebar {
            background: var(--sidebar-bg) !important;
            border: none !important;
            border-bottom: 1px solid rgba(255,255,255,.06) !important;
            padding: 17px 22px !important;
        }

        .ui-dialog .ui-dialog-title {
            font-family: 'Playfair Display', serif !important;
            font-size: 15.5px !important;
            font-weight: 600 !important;
            color: var(--gold) !important;
            letter-spacing: .01em !important;
        }

        .ui-dialog .ui-dialog-titlebar-close {
            color: rgba(255,255,255,.38) !important;
            border-radius: 6px !important;
            transition: var(--transition) !important;
        }

        .ui-dialog .ui-dialog-titlebar-close:hover {
            color: rgba(255,255,255,.78) !important;
            background: rgba(255,255,255,.08) !important;
        }

        .ui-dialog .ui-dialog-content {
            padding: 22px !important;
            background: var(--surface) !important;
        }

        .ui-dialog .ui-dialog-footer {
            padding: 14px 22px !important;
            background: var(--surface-2) !important;
            border-top: 1px solid var(--border-subtle) !important;
            display: flex !important;
            justify-content: flex-end !important;
            gap: 8px !important;
        }

        /* Edit form grid */
        .edit-form-grid {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 14px 18px;
            align-items: center;
        }

        .edit-form-grid label {
            font-size: 10.5px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .09em;
        }

        .edit-form-grid .ui-inputtext {
            width: 100% !important;
            border: 1.5px solid var(--border) !important;
            border-radius: var(--radius-sm) !important;
            padding: 9px 12px !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 13px !important;
            color: var(--text-primary) !important;
            background: var(--surface-2) !important;
            transition: var(--transition) !important;
            box-shadow: none !important;
        }

        .edit-form-grid .ui-inputtext:focus {
            border-color: var(--gold) !important;
            background: var(--surface) !important;
            outline: none !important;
            box-shadow: 0 0 0 3px rgba(201,168,76,.10) !important;
        }

        .edit-form-grid .ui-inputtext[readonly],
        .edit-form-grid .ui-inputtext.ui-state-disabled {
            background: #F2F2F4 !important;
            color: var(--text-muted) !important;
            cursor: not-allowed !important;
            border-color: var(--border-subtle) !important;
        }

        .dialog-section-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: .12em;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 6px;
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dialog-section-label::before {
            content: '';
            display: block;
            width: 14px;
            height: 1.5px;
            background: var(--gold);
            opacity: .6;
        }

        .dialog-btn-update {
            background: var(--gold) !important;
            border: 1px solid var(--gold) !important;
            color: #1A1400 !important;
            border-radius: var(--radius-sm) !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 12.5px !important;
            font-weight: 700 !important;
            padding: 8px 20px !important;
            box-shadow: 0 2px 8px rgba(201,168,76,.26) !important;
            transition: var(--transition) !important;
        }

        .dialog-btn-update:hover {
            background: var(--gold-hover) !important;
            border-color: var(--gold-hover) !important;
            box-shadow: 0 4px 14px rgba(201,168,76,.34) !important;
        }

        .dialog-btn-update .ui-button-icon-left {
            color: inherit !important;
        }

        .dialog-btn-cancel {
            background: transparent !important;
            border: 1px solid var(--border) !important;
            color: var(--text-secondary) !important;
            border-radius: var(--radius-sm) !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 12.5px !important;
            font-weight: 500 !important;
            padding: 8px 17px !important;
            box-shadow: none !important;
            transition: var(--transition) !important;
        }

        .dialog-btn-cancel:hover {
            background: var(--surface-2) !important;
            color: var(--text-primary) !important;
            border-color: #C8C8D0 !important;
        }

        .dialog-btn-cancel .ui-button-icon-left {
            color: inherit !important;
        }

        /* ═══════════════════════════════════════
           RESPONSIVE
        ═══════════════════════════════════════ */
        @media (max-width: 1080px) {
            .content { padding: 20px; }
            .topbar  { padding: 0 20px; }
        }

        @media (max-width: 768px) {
            .topbar  { padding: 0 16px; height: 58px; }
            .content { padding: 14px; }

            .crumb-current { font-size: 15px; }

            .page-banner {
                flex-direction: column;
                align-items: flex-start;
                gap: 18px;
                padding: 22px 24px;
            }

            .profile-grid { grid-template-columns: 1fr 1fr; }

            .profile-field:nth-child(3n)         { border-right: 1px solid var(--border-subtle); }
            .profile-field:nth-child(2n)         { border-right: none; }
            .profile-field:nth-last-child(-n+3)  { border-bottom: 1px solid var(--border-subtle); }
            .profile-field:nth-last-child(-n+2)  { border-bottom: none; }

            .edit-form-grid { grid-template-columns: 1fr; gap: 6px 0; }
            .edit-form-grid label { margin-top: 10px; margin-bottom: -4px; }
            .edit-form-grid label:first-of-type { margin-top: 0; }
        }

        @media (max-width: 480px) {
            .profile-grid { grid-template-columns: 1fr; }
            .profile-field { border-right: none !important; }
            .profile-field:last-child { border-bottom: none !important; }

            .btn-logout span,
            .back-btn-text { display: none; }
        }
    </style>
</h:head>

<h:body>
<h:form id="profileForm">

    <div class="main">

        <!-- ══════════════════════════════════
             TOPBAR  (identical to Admin Profile)
        ══════════════════════════════════ -->
        <header class="topbar">
            <div class="topbar-left">
                <a href="OfficerDashboard.jsf" class="back-btn">
                    <i class="fa fa-arrow-left"></i>
                    Back to Dashboard
                </a>
                <div class="topbar-breadcrumb">
                    <span class="crumb-sep">|</span>
                    <span class="crumb-current">Officer Profile</span>
                </div>
            </div>
            <div class="topbar-right">
                <button class="icon-btn" type="button"
                        aria-label="Notifications"
                        style="position:relative;">
                    <i class="fa fa-bell"></i>
                    <span class="notif-dot"></span>
                </button>
                <a href="login.jsf" class="btn-logout">
                    <i class="fa fa-sign-out-alt"></i>
                    Logout
                </a>
            </div>
        </header>

        <!-- ══════════════════════════════════
             CONTENT
        ══════════════════════════════════ -->
        <div class="content">

            <!-- ── BANNER ── -->
            <div class="page-banner">

                <div class="avatar-large">
                    <h:outputText value="#{officerDashboardBean.officer.userId.fullName != null
                                          ? officerDashboardBean.officer.userId.fullName.substring(0,1).toUpperCase()
                                          : 'O'}"/>
                </div>

                <div class="banner-info">
                    <div class="banner-eyebrow">
                        <span>Officer Profile</span>
                    </div>
                    <div class="officer-name">
                        <h:outputText value="#{officerDashboardBean.officer.userId.fullName}"/>
                    </div>
                    <div class="officer-meta">
                        <span><h:outputText value="#{officerDashboardBean.officer.designation}"/></span>
                        ·
                        <span>Government Grievance Redressal System</span>
                    </div>
                    <div class="banner-badge">
                        <i class="fa fa-map-marker-alt"></i>
                        <h:outputText value="#{officerDashboardBean.officer.zoneId.zoneName}"/>
                    </div>
                </div>

            </div>

            <!-- ── PROFILE DETAILS CARD ── -->
            <div class="section-card">

                <div class="section-head">
                    <span class="section-title">
                        <i class="fa fa-id-card"></i>
                        Personal Information
                    </span>
                </div>

                <div class="profile-grid">

                    <div class="profile-field">
                        <span class="field-label">Full Name</span>
                        <span class="field-value">
                            <i class="fa fa-user"></i>
                            <h:outputText value="#{officerDashboardBean.officer.userId.fullName}"/>
                        </span>
                    </div>

                    <div class="profile-field">
                        <span class="field-label">Username</span>
                        <span class="field-value">
                            <i class="fa fa-at"></i>
                            <h:outputText value="#{officerDashboardBean.officer.userId.username}"/>
                        </span>
                    </div>

                    <div class="profile-field">
                        <span class="field-label">Email</span>
                        <span class="field-value">
                            <i class="fa fa-envelope"></i>
                            <h:outputText value="#{officerDashboardBean.officer.userId.email}"/>
                        </span>
                    </div>

                    <div class="profile-field">
                        <span class="field-label">Mobile</span>
                        <span class="field-value">
                            <i class="fa fa-phone"></i>
                            <h:outputText value="#{officerDashboardBean.officer.userId.mobile}"/>
                        </span>
                    </div>

                    <div class="profile-field">
                        <span class="field-label">Designation</span>
                        <span class="field-value highlight">
                            <i class="fa fa-id-badge"></i>
                            <h:outputText value="#{officerDashboardBean.officer.designation}"/>
                        </span>
                    </div>

                    <div class="profile-field">
                        <span class="field-label">Department</span>
                        <span class="field-value highlight">
                            <i class="fa fa-briefcase"></i>
                            <h:outputText value="#{officerDashboardBean.officer.departmentId.departmentName}"/>
                        </span>
                    </div>

                    <div class="profile-field">
                        <span class="field-label">Ward</span>
                        <span class="field-value">
                            <i class="fa fa-th"></i>
                            <h:outputText value="#{officerDashboardBean.officer.wardId.wardName}"/>
                        </span>
                    </div>

                    <div class="profile-field">
                        <span class="field-label">Zone</span>
                        <span class="field-value">
                            <i class="fa fa-map-marker-alt"></i>
                            <h:outputText value="#{officerDashboardBean.officer.zoneId.zoneName}"/>
                        </span>
                    </div>

                    <!-- Empty placeholder to complete 3rd column of last row -->
                    <div class="profile-field empty"></div>

                </div>

                <!-- ── ACTION ROW ── -->
                <div class="action-row">
                    <div class="btn-gold-wrap">
                        <p:commandButton
                            value="Edit Profile"
                            icon="pi pi-user-edit"
                            type="button"
                            onclick="PF('editProfileDlg').show();"/>
                    </div>
                </div>

            </div>
            <!-- /section-card -->

        </div>
        <!-- /content -->

    </div>
    <!-- /main -->

    <!-- ══════════════════════════════════
         EDIT PROFILE DIALOG
    ══════════════════════════════════ -->
    <p:dialog header="Edit Profile"
              widgetVar="editProfileDlg"
              modal="true"
              closable="true"
              resizable="false"
              draggable="true"
              width="600"
              appendTo="@(body)"
              dynamic="false"
              responsive="true">

        <div class="edit-form-grid">

            <div class="dialog-section-label">Account Details</div>

            <h:outputLabel for="fullName" value="Full Name"/>
            <p:inputText id="fullName"
                         value="#{officerDashboardBean.officer.userId.fullName}"/>

            <h:outputLabel for="email" value="Email"/>
            <p:inputText id="email"
                         value="#{officerDashboardBean.officer.userId.email}"/>

            <h:outputLabel for="mobile" value="Mobile"/>
            <p:inputText id="mobile"
                         value="#{officerDashboardBean.officer.userId.mobile}"/>

            <h:outputLabel for="username" value="Username"/>
            <p:inputText id="username"
                         value="#{officerDashboardBean.officer.userId.username}"/>

            <div class="dialog-section-label" style="margin-top:14px;">
                Role &amp; Status
            </div>

            <h:outputLabel for="role" value="Role"/>
            <p:inputText id="role"
                         value="#{officerDashboardBean.officer.userId.role}"
                         readonly="true"/>

            <h:outputLabel for="status" value="Status"/>
            <p:inputText id="status"
                         value="#{officerDashboardBean.officer.userId.status}"
                         readonly="true"/>

        </div>

        <f:facet name="footer">
            <p:commandButton value="Update"
                             icon="pi pi-check"
                             action="#{officerDashboardBean.updateAdminProfile}"
                             update="profileForm"
                             oncomplete="if(!args.validationFailed) PF('editProfileDlg').hide();"
                             styleClass="dialog-btn-update"/>

            <p:commandButton value="Cancel"
                             icon="pi pi-times"
                             type="button"
                             onclick="PF('editProfileDlg').hide();"
                             styleClass="dialog-btn-cancel"/>
        </f:facet>

    </p:dialog>

</h:form>
</h:body>
</html>
